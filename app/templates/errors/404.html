{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center py-5">
            <i class="fa-solid fa-map-signs text-muted fa-4x mb-4"></i>
            <h2 style="font-family: 'Poppins', sans-serif; font-weight: 600;">Page Not Found</h2>
            <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
            <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('main.index') }}" class="btn btn-primary" style="background-color: #2563EB;">
                <i class="fa-solid fa-arrow-left me-1"></i>Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}

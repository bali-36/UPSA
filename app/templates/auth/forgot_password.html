{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4 p-md-5 text-center">
                    <i class="fa-solid fa-envelope-open-text text-primary fa-2x mb-3"></i>
                    <h4 style="font-family: 'Poppins', sans-serif; font-weight: 600;">Reset Your Password</h4>
                    <p class="text-muted small mb-4">Enter your email and we'll send you a link to reset your password.</p>

                    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-4">
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control" name="email"
                                       placeholder="you@example.com" required autofocus>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2" style="background-color: #2563EB;">
                            Send Reset Link
                        </button>
                    </form>

                    <div class="mt-4">
                        <a href="{{ url_for('auth.login') }}" class="small text-decoration-none" style="color: #2563EB;">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back to Sign In
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

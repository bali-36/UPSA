{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-key text-primary fa-2x mb-3"></i>
                        <h4 style="font-family: 'Poppins', sans-serif; font-weight: 600;">Set New Password</h4>
                        <p class="text-muted small">Enter your new password below.</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-medium">New Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Enter new password" required minlength="8">
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label small fw-medium">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                   placeholder="Re-enter new password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2" style="background-color: #2563EB;">
                            Reset Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow animate-fade-in-up">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-shield-halved text-primary fa-2x mb-3"></i>
                        <h3 style="font-family: 'Poppins', sans-serif; font-weight: 600;">Welcome Back</h3>
                        <p class="text-muted small">Sign in to your secure dashboard</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                       placeholder="you@example.com" required autofocus>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter your password" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                                <label class="form-check-label small text-muted" for="remember_me">Remember me</label>
                            </div>
                            <a href="{{ url_for('auth.forgot_password') }}" class="small text-decoration-none" style="color: #2563EB;">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2" style="background-color: #2563EB; border-color: #2563EB;">
                            Sign In
                        </button>
                    </form>

                    <div class="d-flex align-items-center my-4">
                        <hr class="flex-grow-1">
                        <span class="mx-3 text-muted small">or</span>
                        <hr class="flex-grow-1">
                    </div>

                    <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary w-100 py-2">
                        Create an Account
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
});
</script>
{% endblock %}
